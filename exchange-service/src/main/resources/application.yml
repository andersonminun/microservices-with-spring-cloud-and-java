spring:
    application:
        name: exchange-service
    datasource:
        url: jdbc:mysql://localhost:3306/exchange_service
        username: ${DB_USER}
        password: ${DB_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: none
        show-sql: false
            
server:
    port: 8000

springdoc:
    api-docs: 
        path: /v3/api-docs
    swagger-ui: 
        path: /v3/swagger-ui.html
    override-server-url: true

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
