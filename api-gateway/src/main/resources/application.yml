spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            server:
                webflux:
                    routes:
                        - id: exchange-service-docs
                          uri: lb://exchange-service
                          predicates:
                            - Path=/exchange-service/v3/api-docs
                          filters:
                            - RewritePath=/exchange-service/v3/api-docs, /v3/api-docs
                        - id: book-service
                          uri: lb://book-service
                          predicates:
                            - Path=/book-service/**
                        - id: exchange-service
                          uri: lb://exchange-service
                          predicates:
                            - Path=/exchange-service/**
management:
    tracing:
        sampling:
            probability: 1.0
    zipkin:
        tracing:
            endpoint: http://localhost:9411/api/v2/spans
                              
springdoc:
    swagger-ui: 
        urls:
            - name: Book Service API
              url: /book-service/v3/api-docs
            - name: Exchange Service API
              url: /exchange-service/v3/api-docs

server:
    port: 8765

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
    instance:
        prefer-ip-address: true
        instance-id: ${spring.application.name}:${server.port}
