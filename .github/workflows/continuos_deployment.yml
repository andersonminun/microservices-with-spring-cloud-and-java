name: Microservices Continuos Deployment with Github Actions

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

    - name: Setup Java 21  
      uses: actions/setup-java@v5
      with:
        distribution: 'adopt' # See 'Supported distributions' for available options
        java-version: '21'

    - name: Docker Compose Build
      run: docker compose build

    - name: Tag Docker Images
      run: |
        docker tag naming-service:latest ${{ secrets.DOCKER_USERNAME }}/naming-service:latest
        docker tag naming-service:latest ${{ secrets.DOCKER_USERNAME }}/naming-service:${{ github.RUN_ID }}
        docker tag api-gateway:latest ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
        docker tag api-gateway:latest ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.RUN_ID }}
        docker tag book-service:latest ${{ secrets.DOCKER_USERNAME }}/book-service:latest
        docker tag book-service:latest ${{ secrets.DOCKER_USERNAME }}/book-service:${{ github.RUN_ID }}
        docker tag exchange-service:latest ${{ secrets.DOCKER_USERNAME }}/exchange-service:latest
        docker tag exchange-service:latest ${{ secrets.DOCKER_USERNAME }}/exchange-service:${{ github.RUN_ID }}


    - name: Docker Compose Push
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/naming-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/naming-service:${{ github.RUN_ID }}
        docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ github.RUN_ID }}
        docker push ${{ secrets.DOCKER_USERNAME }}/book-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/book-service:${{ github.RUN_ID }}
        docker push ${{ secrets.DOCKER_USERNAME }}/exchange-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/exchange-service:${{ github.RUN_ID }}
